<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spanier Painting — Design Review</title>
<script>
  // GitHub Pages SPA shim — redirects unknown paths under /spanier-design-review/
  // back to index with the path stored in sessionStorage so React Router can pick it up.
  (function () {
    var basePath = "/spanier-design-review";
    var path = window.location.pathname;
    if (path.indexOf(basePath) === 0) {
      var inner = path.slice(basePath.length) + window.location.search + window.location.hash;
      sessionStorage.setItem("spa-redirect", inner);
      window.location.replace(basePath + "/");
    } else {
      window.location.replace("/");
    }
  }());
</script>
</head>
<body>Redirecting…</body>
</html>
