<!-- Variant B: Confident brushstroke S — the S is a single hand-painted stroke
     with brush-edge texture. No separate brush icon needed. Premium / craft. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Spanier Painting brushstroke mark">
  <defs>
    <!-- Subtle brush-bristle texture along the stroke edge -->
    <filter id="bristle" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.4"/>
    </filter>
  </defs>
  <!-- Subtle ring (lighter weight, gives the badge frame without competing) -->
  <circle cx="60" cy="60" r="55" fill="none" stroke="currentColor" stroke-width="1" opacity="0.35"/>
  <!-- The S as a single brushstroke — slightly tapered, bristle-displaced edge.
       Wider in the middle, narrower at start and end (real brush behavior). -->
  <g filter="url(#bristle)">
    <path d="M42 41
             C42 34  56  29  66  31
             C76 33  80 39  78 44
             C76 49  68 51  61 53.5
             C53 57  44 60  44 67
             C44 76  54 82  64 82
             C73 82  79 78  80 73"
          fill="none"
          stroke="currentColor"
          stroke-width="11"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>
  <!-- A tiny accent dot at the start of the brushstroke (where the brush 'set down') -->
  <circle cx="42" cy="41" r="2" fill="currentColor" opacity="0.55"/>
</svg>
