<!-- P · Painted edge on one letter — italic serif "Spanier" where the right
     edge of one letter (the 'r') extends like a brush pull. The painted gesture
     is the only reference to the trade. Adjacent expansion. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" role="img" aria-label="Spanier">
  <defs>
    <filter id="edge-bristle" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="1.4" numOctaves="2" seed="9" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
  </defs>
  <text x="170" y="68"
        font-family="'Cormorant Garamond', 'Crimson Pro', 'Playfair Display', Georgia, serif"
        font-style="italic"
        font-weight="500"
        font-size="76"
        letter-spacing="-0.6"
        text-anchor="middle"
        fill="currentColor">Spanier</text>
  <!-- The painted extension — a single confident horizontal pull from where
       the final 'r' would terminate, with bristle texture trailing off. -->
  <g filter="url(#edge-bristle)">
    <path d="M254 56
             C 280 54, 310 54, 340 56
             C 350 56, 358 57, 366 58
             C 358 59, 350 60, 340 60
             C 310 60, 280 60, 254 60 Z"
          fill="currentColor"/>
    <!-- Trailing dry-brush wisps -->
    <line x1="362" y1="55" x2="378" y2="56" stroke="currentColor" stroke-width="0.8"/>
    <line x1="364" y1="58" x2="376" y2="59" stroke="currentColor" stroke-width="0.8"/>
    <line x1="362" y1="61" x2="372" y2="61" stroke="currentColor" stroke-width="0.8"/>
  </g>
</svg>
