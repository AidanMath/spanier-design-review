<!-- J · Solid painted bar + sans wordmark — thicker rect, lighter filter so
     the bar stays visible. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 170" role="img" aria-label="Spanier Painting">
  <defs>
    <filter id="bristle-j" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="1.5" numOctaves="1" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>
  <g filter="url(#bristle-j)">
    <rect x="60" y="44" width="280" height="42" fill="currentColor"/>
  </g>
  <!-- Trailing dry-brush wisps off the right edge (outside the filter so they keep shape) -->
  <g opacity="0.7">
    <line x1="340" y1="50" x2="362" y2="52" stroke="currentColor" stroke-width="2"/>
    <line x1="340" y1="58" x2="368" y2="60" stroke="currentColor" stroke-width="2"/>
    <line x1="340" y1="66" x2="364" y2="68" stroke="currentColor" stroke-width="2"/>
    <line x1="340" y1="74" x2="358" y2="76" stroke="currentColor" stroke-width="2"/>
    <line x1="340" y1="82" x2="354" y2="84" stroke="currentColor" stroke-width="2"/>
  </g>
  <text x="200" y="128"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="500"
        font-size="22"
        letter-spacing="5"
        text-anchor="middle"
        fill="currentColor">SPANIER PAINTING</text>
</svg>
