<!-- L · SP monogram — heavy geometric "SP" set tight so the letters touch.
     Reads as a paired monogram without the complexity of a hand-drawn ligature. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 240" role="img" aria-label="SP — Spanier Painting">
  <text x="140" y="190"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="220"
        letter-spacing="-18"
        text-anchor="middle"
        fill="currentColor">SP</text>
  <!-- Wordmark beneath -->
  <text x="140" y="232"
        font-family="'EB Garamond', 'Cormorant Garamond', Georgia, serif"
        font-weight="500"
        font-size="14"
        letter-spacing="3"
        text-anchor="middle"
        fill="currentColor"
        opacity="0.78">SPANIER PAINTING</text>
</svg>
