<!-- K · Layered S monogram — heavy outlined S with internal diagonal cutting
     through, creating the "S within S" effect. Wordmark beneath. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300" role="img" aria-label="Spanier Painting">
  <!-- The heavy S, drawn as a thick stroked path with rounded joints -->
  <path d="M170 80
           Q 170 50, 130 50
           Q 80 50, 80 90
           Q 80 120, 130 130
           Q 170 140, 170 175
           Q 170 220, 120 220
           Q 70 220, 70 190"
        fill="none"
        stroke="currentColor"
        stroke-width="22"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  <!-- Internal diagonal that gives the layered/folded effect -->
  <line x1="78" y1="195" x2="170" y2="78"
        stroke="currentColor"
        stroke-width="22"
        stroke-linecap="round"/>
  <!-- Wordmark beneath -->
  <text x="120" y="280"
        font-family="'EB Garamond', 'Cormorant Garamond', Georgia, serif"
        font-weight="600"
        font-size="20"
        letter-spacing="3"
        text-anchor="middle"
        fill="currentColor">SPANIER PAINTING</text>
</svg>
