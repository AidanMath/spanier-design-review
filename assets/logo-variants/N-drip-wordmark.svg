<!-- N · Drip wordmark — italic display serif "Spanier" with a single restrained
     paint drip extending from one letter. Adjacent expansion. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 130" role="img" aria-label="Spanier">
  <text x="200" y="74"
        font-family="'Playfair Display', 'DM Serif Display', 'Bodoni Moda', Georgia, serif"
        font-weight="900"
        font-style="italic"
        font-size="84"
        letter-spacing="-1"
        text-anchor="middle"
        fill="currentColor">Spanier</text>
  <!-- Single restrained drip from beneath the 'p' (around x=190 in the wordmark) -->
  <path d="M191 76
           C 191 84, 189 92, 188 98
           C 187 104, 187 110, 189 114
           C 191 117, 195 117, 197 114
           C 199 110, 199 104, 198 98
           C 197 92, 195 84, 195 78"
        fill="currentColor"/>
  <!-- A tiny secondary droplet just below — like a slow drip -->
  <ellipse cx="193" cy="120" rx="2.5" ry="3.5" fill="currentColor" opacity="0.8"/>
</svg>
