<!-- M · Painted color swatch + wordmark — a small painted square beside an
     italic serif wordmark. The swatch IS the icon. Adjacent expansion. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" role="img" aria-label="Spanier Painting">
  <defs>
    <filter id="swatch-bristle" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="2.2" numOctaves="1" seed="5" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="0.8"/>
    </filter>
  </defs>
  <!-- Color swatch — slightly textured edges -->
  <g filter="url(#swatch-bristle)">
    <rect x="40" y="34" width="44" height="32" fill="currentColor"/>
  </g>
  <!-- Wordmark in italic serif -->
  <text x="100" y="58"
        font-family="'Cormorant Garamond', 'Crimson Pro', Georgia, serif"
        font-style="italic"
        font-weight="500"
        font-size="44"
        letter-spacing="-0.5"
        fill="currentColor">Spanier Painting</text>
  <!-- Sub-imprint -->
  <text x="100" y="76"
        font-family="'DM Mono', monospace"
        font-size="9"
        letter-spacing="3"
        fill="currentColor"
        opacity="0.7">RESIDENTIAL · COMMERCIAL · ST. CLOUD, MN</text>
</svg>
