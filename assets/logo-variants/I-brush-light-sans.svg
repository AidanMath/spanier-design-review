<!-- I · Confident bristled brushstroke + light sans wordmark — rebuilt with
     a thick stroked path so the bristle filter doesn't collapse the geometry. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 170" role="img" aria-label="Spanier Painting">
  <defs>
    <filter id="bristle-i" x="-5%" y="-30%" width="110%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="5" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="3"/>
    </filter>
  </defs>
  <!-- Confident curved horizontal brushstroke — thick stroked path -->
  <g filter="url(#bristle-i)">
    <path d="M60 70 Q 200 56, 332 70"
          fill="none"
          stroke="currentColor"
          stroke-width="30"
          stroke-linecap="round"/>
    <!-- Trailing dry-brush wisps at the end -->
    <path d="M332 64 L356 66 M334 70 L354 72 M332 76 L348 78"
          stroke="currentColor" stroke-width="2" fill="none" opacity="0.65"/>
  </g>
  <text x="200" y="128"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="300"
        font-size="22"
        letter-spacing="6"
        text-anchor="middle"
        fill="currentColor">SPANIER PAINTING</text>
</svg>
